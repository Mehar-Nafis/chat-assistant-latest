apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "insurance-chat-assistant.fullname" . }}-etcd
  labels:
    {{- include "insurance-chat-assistant.labels" . | nindent 4 }}
    app.kubernetes.io/component: etcd
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "insurance-chat-assistant.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: etcd
  template:
    metadata:
      labels:
        {{- include "insurance-chat-assistant.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: etcd
    spec:
      {{- include "insurance-chat-assistant.podSecurityContext" . | nindent 6 }}
      containers:
      - name: etcd
        image: {{ include "insurance-chat-assistant.image" .Values.images.etcd }}
        imagePullPolicy: {{ .Values.images.etcd.pullPolicy }}
        ports:
        - containerPort: 2379
          name: client
        command:
        - etcd
        - --advertise-client-urls=http://{{ include "insurance-chat-assistant.fullname" . }}-etcd:2379
        - --listen-client-urls=http://0.0.0.0:2379
        - --data-dir=/etcd
        - --auto-compaction-mode=revision
        - --auto-compaction-retention=1000
        - --quota-backend-bytes=4294967296
        - --snapshot-count=50000
        readinessProbe:
          exec:
            command: ["etcdctl", "endpoint", "health"]
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 5
        volumeMounts:
        - name: etcd-data
          mountPath: /etcd
        resources:
          {{- toYaml .Values.resources.etcd | nindent 10 }}
        {{- include "insurance-chat-assistant.securityContext" . | nindent 8 }}
      volumes:
      - name: etcd-data
        persistentVolumeClaim:
          claimName: {{ include "insurance-chat-assistant.fullname" . }}-etcd-data
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "insurance-chat-assistant.fullname" . }}-minio
  labels:
    {{- include "insurance-chat-assistant.labels" . | nindent 4 }}
    app.kubernetes.io/component: minio
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "insurance-chat-assistant.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: minio
  template:
    metadata:
      labels:
        {{- include "insurance-chat-assistant.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: minio
    spec:
      {{- include "insurance-chat-assistant.podSecurityContext" . | nindent 6 }}
      containers:
      - name: minio
        image: {{ include "insurance-chat-assistant.image" .Values.images.minio }}
        imagePullPolicy: {{ .Values.images.minio.pullPolicy }}
        command: ["minio", "server", "/minio_data", "--console-address", ":9001"]
        ports:
        - containerPort: 9000
          name: api
        - containerPort: 9001
          name: console
        env:
        - name: MINIO_ROOT_USER
          value: {{ .Values.env.minioAccessKey | quote }}
        - name: MINIO_ROOT_PASSWORD
          value: {{ .Values.env.minioSecretKey | quote }}
        readinessProbe:
          httpGet:
            path: /minio/health/live
            port: 9000
          initialDelaySeconds: 10
          periodSeconds: 10
          failureThreshold: 5
        volumeMounts:
        - name: minio-data
          mountPath: /minio_data
        resources:
          {{- toYaml .Values.resources.minio | nindent 10 }}
        {{- include "insurance-chat-assistant.securityContext" . | nindent 8 }}
      volumes:
      - name: minio-data
        persistentVolumeClaim:
          claimName: {{ include "insurance-chat-assistant.fullname" . }}-minio-data
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "insurance-chat-assistant.fullname" . }}-milvus
  labels:
    {{- include "insurance-chat-assistant.labels" . | nindent 4 }}
    app.kubernetes.io/component: milvus
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "insurance-chat-assistant.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: milvus
  template:
    metadata:
      labels:
        {{- include "insurance-chat-assistant.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: milvus
    spec:
      {{- include "insurance-chat-assistant.podSecurityContext" . | nindent 6 }}
      initContainers:
      # Wait for etcd before starting
      - name: wait-for-etcd
        image: busybox
        command: ['sh', '-c', 'until nc -z {{ include "insurance-chat-assistant.fullname" . }}-etcd 2379; do echo waiting for etcd; sleep 2; done']
      # Wait for minio before starting
      - name: wait-for-minio
        image: busybox
        command: ['sh', '-c', 'until nc -z {{ include "insurance-chat-assistant.fullname" . }}-minio 9000; do echo waiting for minio; sleep 2; done']
      containers:
      - name: milvus
        image: {{ include "insurance-chat-assistant.image" .Values.images.milvus }}
        imagePullPolicy: {{ .Values.images.milvus.pullPolicy }}
        command: ["milvus", "run", "standalone"]
        ports:
        - containerPort: 19530
          name: grpc
        - containerPort: 9091
          name: http
        env:
        - name: ETCD_ENDPOINTS
          value: "http://{{ include "insurance-chat-assistant.fullname" . }}-etcd:2379"
        - name: MINIO_ADDRESS
          value: "{{ include "insurance-chat-assistant.fullname" . }}-minio:9000"
        - name: MINIO_ACCESS_KEY
          value: {{ .Values.env.minioAccessKey | quote }}
        - name: MINIO_SECRET_KEY
          value: {{ .Values.env.minioSecretKey | quote }}
        - name: COMMON_STORAGETYPE
          value: "local"
        readinessProbe:
          httpGet:
            path: /healthz
            port: 9091
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 10
          failureThreshold: 10
        volumeMounts:
        - name: milvus-data
          mountPath: /var/lib/milvus
        resources:
          {{- toYaml .Values.resources.milvus | nindent 10 }}
        {{- include "insurance-chat-assistant.securityContext" . | nindent 8 }}
      volumes:
      - name: milvus-data
        persistentVolumeClaim:
          claimName: {{ include "insurance-chat-assistant.fullname" . }}-milvus-data
