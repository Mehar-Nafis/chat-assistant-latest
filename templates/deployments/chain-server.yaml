apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "insurance-chat-assistant.fullname" . }}-chain-server
  labels:
    {{- include "insurance-chat-assistant.labels" . | nindent 4 }}
    app.kubernetes.io/component: chain-server
spec:
  replicas: {{ .Values.deployment.replicas.chainServer }}
  selector:
    matchLabels:
      {{- include "insurance-chat-assistant.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: chain-server
  template:
    metadata:
      labels:
        {{- include "insurance-chat-assistant.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: chain-server
    spec:
      {{- include "insurance-chat-assistant.podSecurityContext" . | nindent 6 }}
      containers:
      - name: chain-server
        image: {{ include "insurance-chat-assistant.image" .Values.images.chainServer }}
        imagePullPolicy: {{ .Values.images.chainServer.pullPolicy }}
        ports:
        - containerPort: 8009
          name: http
        env:
        - name: LLM_API_KEY
          valueFrom:
            secretKeyRef:
              name: {{ include "insurance-chat-assistant.secretName" . }}
              key: LLM_API_KEY
        - name: CATALOG_RETRIEVER_URL
          value: "http://{{ include "insurance-chat-assistant.fullname" . }}-catalog-retriever:8010"
        - name: MEMORY_RETRIEVER_URL
          value: "http://{{ include "insurance-chat-assistant.fullname" . }}-memory-retriever:8011"
        {{- if .Values.env.configOverride }}
        - name: CONFIG_OVERRIDE
          value: {{ .Values.env.configOverride | quote }}
        {{- end }}
        {{- if .Values.healthChecks.enabled }}
        livenessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: {{ .Values.healthChecks.livenessProbe.initialDelaySeconds }}
          periodSeconds: {{ .Values.healthChecks.livenessProbe.periodSeconds }}
          timeoutSeconds: {{ .Values.healthChecks.livenessProbe.timeoutSeconds }}
          failureThreshold: {{ .Values.healthChecks.livenessProbe.failureThreshold }}
        readinessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: {{ .Values.healthChecks.readinessProbe.initialDelaySeconds }}
          periodSeconds: {{ .Values.healthChecks.readinessProbe.periodSeconds }}
          timeoutSeconds: {{ .Values.healthChecks.readinessProbe.timeoutSeconds }}
          failureThreshold: {{ .Values.healthChecks.readinessProbe.failureThreshold }}
        {{- end }}
        resources:
          {{- toYaml .Values.resources.chainServer | nindent 10 }}
        {{- include "insurance-chat-assistant.securityContext" . | nindent 8 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}