{{- $initSql := .Files.Get "files/init_db.sql" -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "insurance-chat-assistant.fullname" . }}-init-sql
  labels:
    {{- include "insurance-chat-assistant.labels" . | nindent 4 }}
data:
  init_db.sql: |
    -- Initialize insurance database with all required tables

    CREATE SCHEMA IF NOT EXISTS insurance;

    -- Policies table
    CREATE TABLE IF NOT EXISTS insurance.policies (
        policy_id TEXT PRIMARY KEY,
        policy_type TEXT NOT NULL,
        insurer TEXT NOT NULL,
        is_active BOOLEAN DEFAULT TRUE,
        created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP
    );

    -- User policies table
    CREATE TABLE IF NOT EXISTS insurance.user_policies (
        user_id TEXT NOT NULL,
        policy_id TEXT NOT NULL,
        role TEXT DEFAULT 'PRIMARY',
        start_date DATE,
        end_date DATE,
        PRIMARY KEY (user_id, policy_id),
        FOREIGN KEY (policy_id) REFERENCES insurance.policies(policy_id)
    );

    -- Claims table
    CREATE TABLE IF NOT EXISTS insurance.claims (
        claim_id TEXT PRIMARY KEY,
        user_id TEXT NOT NULL,
        policy_id TEXT,
        claim_amount DECIMAL(10,2),
        claim_reason VARCHAR(200),
        claim_date DATE,
        status VARCHAR(20),
        FOREIGN KEY (policy_id) REFERENCES insurance.policies(policy_id)
    );

    -- Claim events table
    CREATE TABLE IF NOT EXISTS insurance.claim_events (
        event_id SERIAL PRIMARY KEY,
        claim_id TEXT NOT NULL,
        event_type TEXT,
        event_note TEXT,
        created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP,
        FOREIGN KEY (claim_id) REFERENCES insurance.claims(claim_id)
    );

    -- Sample policies
    INSERT INTO insurance.policies (policy_id, policy_type, insurer, is_active) VALUES
