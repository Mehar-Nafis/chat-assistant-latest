{{/* PersistentVolumeClaims for all stateful services */}}

# Milvus Data
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "insurance-chat-assistant.fullname" . }}-milvus-data
  labels:
    {{- include "insurance-chat-assistant.labels" . | nindent 4 }}
spec:
  accessModes:
  - ReadWriteOnce
  {{- include "insurance-chat-assistant.storageClass" . | nindent 2 }}
  resources:
    requests:
      storage: {{ .Values.persistence.milvusData.size }}
---
