{{/* All Kubernetes Services for the Insurance Chat Assistant */}}

# Chain Server
apiVersion: v1
kind: Service
metadata:
  name: {{ include "insurance-chat-assistant.fullname" . }}-chain-server
  labels:
    {{- include "insurance-chat-assistant.labels" . | nindent 4 }}
    app.kubernetes.io/component: chain-server
spec:
  type: {{ .Values.services.chainServer.type }}
  ports:
  - port: {{ .Values.services.chainServer.port }}
    targetPort: http
    name: http
  selector:
    {{- include "insurance-chat-assistant.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: chain-server
---
# Catalog Retriever
apiVersion: v1
kind: Service
metadata:
  name: {{ include "insurance-chat-assistant.fullname" . }}-catalog-retriever
  labels:
    {{- include "insurance-chat-assistant.labels" . | nindent 4 }}
    app.kubernetes.io/component: catalog-retriever
spec:
  type: {{ .Values.services.catalogRetriever.type }}
  ports:
  - port: {{ .Values.services.catalogRetriever.port }}
    targetPort: http
    name: http
  selector:
    {{- include "insurance-chat-assistant.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: catalog-retriever
---
