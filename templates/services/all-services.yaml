    targetPort: http
    name: http
  selector:
    {{- include "insurance-chat-assistant.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
---
# Nginx (entry point - routes to frontend and chain-server)
apiVersion: v1
kind: Service
metadata:
  name: {{ include "insurance-chat-assistant.fullname" . }}-nginx
  labels:
    {{- include "insurance-chat-assistant.labels" . | nindent 4 }}
    app.kubernetes.io/component: nginx
spec:
  type: {{ .Values.services.nginx.type }}
  ports:
  - port: 80
    targetPort: 8080
    name: http
  selector:
    {{- include "insurance-chat-assistant.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: nginx
---
