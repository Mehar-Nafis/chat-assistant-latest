  name: {{ include "insurance-chat-assistant.fullname" . }}-rails
  labels:
    {{- include "insurance-chat-assistant.labels" . | nindent 4 }}
    app.kubernetes.io/component: rails
spec:
  type: {{ .Values.services.rails.type }}
